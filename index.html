                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <small>Sist: ${it.sistema} | Fis: ${it.fisico} | Defectos: ${it.defectos}</small>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <div class="grid-adj">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <button class="btn-adj" onclick="ajustar('${it.upc}', -1, 'fisico')">-1</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <button class="btn-adj" onclick="ajustar('${it.upc}', 1, 'fisico')">+1</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <button class="btn-defecto" onclick="ajustar('${it.upc}', 1, 'defecto')">⚠️ +1 DEFECTO</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </div>`;
          })
          .join("");
      }

      async function editarTotal(upc, nombre) {
        const nuevoFisico = prompt(
          "Editar Inventario FÍSICO Total para:\n" + nombre
        );
        if (nuevoFisico !== null && nuevoFisico !== "") {
          const valor = parseInt(nuevoFisico);
          if (!isNaN(valor)) {
            await fetch(API, {
              method: "POST",
              body: JSON.stringify({
                action: "update_stock",
                upc: upc,
                valor: valor,
                tipo: "set_total",
                tienda: tiendaActual,
              }),
            });
            buscarGestion();
          }
        }
      }

      async function ajustar(upc, valor, tipo) {
        await fetch(API, {
          method: "POST",
          body: JSON.stringify({
            action: "update_stock",
            upc: upc,
            valor: valor,
            tipo: tipo,
            tienda: tiendaActual,
          }),
        });
        buscarGestion();
      }

      async function buscarParaAlias(q) {
        if (q.length < 3) return;
        const r = await fetch(API, {
          method: "POST",
          body: JSON.stringify({
            action: "search_stock",
            query: q,
            tienda: tiendaActual,
          }),
        });
        const d = await r.json();
        document.getElementById("res-alias").innerHTML = d.data
          .map(
            (it) => `
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <div class="card" style="color:black; cursor:pointer;" onclick="ligarAlias('${it.upc}')">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <b>${it.nombre}</b><br><small style="color:var(--orange)">UPC: ${it.upc}</small>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </div>`
          )
          .join("");
      }

      async function ligarAlias(upcReal) {
        await fetch(API, {
          method: "POST",
          body: JSON.stringify({
            action: "link_alias",
            nuevo_upc: upcPendiente,
            upc_real: upcReal,
          }),
        });
        document.getElementById("modal-alias").style.display = "none";
        procesarScan(upcPendiente); // Esto reinicia la cámara tras vincular
      }

      document.getElementById("f-in").onchange = (e) => {
        const bar = document.getElementById("progress-bar");
        document.getElementById("progress-container").style.display = "block";
        const fr = new FileReader();
        fr.onload = async (ev) => {
          const wb = XLSX.read(ev.target.result, { type: "binary" });
          const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
          const items = data.map((r) => ({
            upc: String(r.UPC || r.Codigo || ""),
            nombre: r.Nombre || r.Item || "",
            precio: r.Precio || 0,
            inventario: r.Sistema || r.Inventario || 0,
            plataforma: r.Plataforma || "",
            categoria: r.Categoria || "",
          }));
          await fetch(API, {
            method: "POST",
            body: JSON.stringify({
              action: "upload_inventory",
              items: items,
              tienda: tiendaActual,
            }),
          });
          bar.style.width = "100%";
          setTimeout(() => {
            document.getElementById("progress-container").style.display =
              "none";
            alert("Carga Completa");
          }, 500);
        };
        fr.readAsBinaryString(e.target.files[0]);
      };
    </script>
  </body>
</html>
